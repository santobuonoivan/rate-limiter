services:
  # ==========================================
  # Rate Limiter API Service
  # ==========================================
  rate-limiter:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: rate-limiter-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - STORAGE_TYPE=${STORAGE_TYPE:-memory}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - RATE_LIMIT_ALGORITHM=${RATE_LIMIT_ALGORITHM:-TOKEN_BUCKET}
      - DEFAULT_REQUESTS_PER_MINUTE=${DEFAULT_REQUESTS_PER_MINUTE:-100}
      - ENABLE_GLOBAL_INTERCEPTOR=${ENABLE_GLOBAL_INTERCEPTOR:-true}
      - LOG_LEVEL=${LOG_LEVEL:-log}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rate-limiter-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Redis Cache Service
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis-data:/data
    networks:
      - rate-limiter-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # Redis Commander (UI opcional)
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rate-limiter-redis-ui
    restart: unless-stopped
    profiles:
      - tools # Solo se inicia con --profile tools
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-changeme}
      - HTTP_USER=${REDIS_UI_USER:-admin}
      - HTTP_PASSWORD=${REDIS_UI_PASSWORD:-admin}
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    depends_on:
      - redis
    networks:
      - rate-limiter-network

networks:
  rate-limiter-network:
    driver: bridge
    name: rate-limiter-network

volumes:
  redis-data:
    driver: local
    name: rate-limiter-redis-data
